name: Docs handbook

on:
  push:
  pull_request:

jobs:
  verify-handbook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate development handbook
        run: npm run docs:generate

      - name: Fail if handbook snapshot is stale
        run: git diff --exit-code
